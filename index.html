<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal - Sistema NAEE</title>
    <link rel="stylesheet" href="document-app.css?v=2">
    <style>
        :root { --primary: #4CAF50; --primary-hover: #45a049; --bg: #f4f7f6; --text: #333; }
        .menu-container { display: none; }
    </style>
</head>
<body class="menu-page">
    <div class="dashboard-shell">
        <div class="menu-simple">
            <img src="logo-naee-2.png" alt="Logo NAEE" class="logo-principal">
            <h1 id="saudacao">Olá!</h1>
            <p id="data-hora"></p>

            <div class="menu-list">
                <a href="documento.html?model=pei">Plano Educacional Individualizado (PEI)</a>
                <a href="documento.html?model=matematica_inicial">Monitoramento Hab. Básicas (Matemática - Inicial)</a>
                <a href="documento.html?model=matematica_bimestral">Monitoramento Bimestral (Matemática e Geometria)</a>
                <a href="documento.html?model=portugues_inicial">Monitoramento Hab. Básicas (Português - Inicial)</a>
                <a href="documento.html?model=geral_bimestral">Monitoramento Bimestral (Habilidades Básicas)</a>
                <a href="documento.html?model=portugues_bimestral">Monitoramento Bimestral (Português)</a>
            </div>

            <div class="brand-strip">
                <img src="orindiuva-logo.png" alt="Prefeitura Municipal de Orindiúva">
                <img src="sme-logo.png" alt="Secretaria Municipal da Educação">
            </div>
        </div>
    </div>

    <script>
        function atualizarRelogio() {
            const agora = new Date();
            const hora = agora.getHours();
            let saudacaoTexto = "Bom dia!";
            if (hora >= 12 && hora < 18) { saudacaoTexto = "Boa tarde!"; } 
            else if (hora >= 18 || hora < 5) { saudacaoTexto = "Boa noite!"; }
            document.getElementById('saudacao').innerText = saudacaoTexto;

            const opcoesData = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let dataFormatada = agora.toLocaleDateString('pt-BR', opcoesData);
            dataFormatada = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);
            const horaFormatada = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-hora').innerText = dataFormatada + " - " + horaFormatada;
        }
        atualizarRelogio();
        setInterval(atualizarRelogio, 1000);
    </script>
</body>
</html>
